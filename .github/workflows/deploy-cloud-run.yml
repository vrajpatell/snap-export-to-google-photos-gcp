name: deploy-cloud-run
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'pyproject.toml'
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet
      - run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --service-account "${{ secrets.CLOUD_RUN_RUNTIME_SA }}" \
            --set-env-vars "USE_GCP_BACKENDS=true,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_REGION=${{ secrets.GCP_REGION }}"
